<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>rusNAS Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1923;color:#e0e6f0;min-height:100vh}
nav{background:#1a2332;padding:12px 24px;display:flex;gap:16px;align-items:center;border-bottom:1px solid #1e2d3d}
nav strong{color:#fff;margin-right:8px}nav a{color:#7eb3e8;text-decoration:none;font-size:14px}
nav a:hover{color:#fff}
.container{max-width:1100px;margin:32px auto;padding:0 16px}
h2{font-size:20px;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 12px;border-bottom:1px solid #1e2d3d;text-align:left}
th{background:#1a2332;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8}
tr:hover{background:#1a2332}
.btn{display:inline-block;padding:7px 14px;border:none;border-radius:4px;cursor:pointer;font-size:13px;text-decoration:none}
.btn-primary{background:#0099ff;color:#fff}.btn-danger{background:#e74c3c;color:#fff}
.btn-secondary{background:#2d3f52;color:#e0e6f0}
.btn:hover{opacity:.85}
input,select,textarea{background:#1a2332;color:#e0e6f0;border:1px solid #2d3f52;padding:8px 10px;border-radius:4px;font-size:14px;width:100%}
.form-group{margin-bottom:16px}label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.badge-active{color:#2ecc71}.badge-expired{color:#e74c3c}.badge-revoked{color:#95a5a6}
.stat-cards{display:flex;gap:16px;margin-bottom:28px}
.stat-card{background:#1a2332;border:1px solid #1e2d3d;border-radius:6px;padding:16px 20px;flex:1}
.stat-card .num{font-size:28px;font-weight:700;color:#0099ff}
.stat-card .label{font-size:12px;color:#94a3b8;margin-top:4px}
</style></head><body>
<nav><strong>rusNAS Admin</strong>
<a href="/admin/">Dashboard</a>
<a href="/admin/serials">Серийники</a>
<a href="/admin/licenses">Лицензии</a>
<a href="/admin/license/new">+ Лицензия</a></nav>
<div class="container">{% block content %}{% endblock %}</div>
</body></html>
