# rusNAS Distribution Server — nginx configuration
# Deploy: scp vps-setup/nginx-rusnas.conf rusnas-vps:/etc/nginx/sites-available/rusnas
# Enable: ssh rusnas-vps "ln -sf /etc/nginx/sites-available/rusnas /etc/nginx/sites-enabled/rusnas && nginx -t && systemctl reload nginx"

server {
    listen 443 ssl http2;
    server_name activate.rusnas.ru;

    ssl_certificate     /etc/letsencrypt/live/activate.rusnas.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/activate.rusnas.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Bootstrap script ──────────────────────────────────────────────────────
    location = /install {
        alias /var/www/rusnas-install/bootstrap.sh;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header X-Content-Type-Options nosniff;
    }

    # ── GPG signing key for apt ────────────────────────────────────────────────
    location = /apt/rusnas.gpg {
        alias /var/www/rusnas-install/rusnas.gpg;
        add_header Content-Type "application/pgp-keys";
    }

    # ── apt repository (reprepro, authenticated) ──────────────────────────────
    location /apt/ {
        auth_request        /apt-auth-internal;
        error_page 401 403  = @apt_denied;
        alias               /var/lib/reprepro/public/;
        autoindex           off;
    }

    # Internal subrequest to apt-auth service (port 8766)
    location = /apt-auth-internal {
        internal;
        proxy_pass              http://127.0.0.1:8766;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Authorization $http_authorization;
        proxy_set_header        X-Original-URI $request_uri;
        proxy_cache_valid       200 60s;
    }

    location @apt_denied {
        default_type application/json;
        return 403 '{"ok":false,"error":"license_required"}';
    }

    # ── Health check (unauthenticated) ────────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8765/health;
    }

    # ── License server API + admin UI + customer activation page ─────────────
    location / {
        proxy_pass         http://127.0.0.1:8765;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name activate.rusnas.ru;
    return 301 https://$host$request_uri;
}
