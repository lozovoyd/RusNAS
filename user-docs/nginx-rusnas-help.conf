# RusNAS User Documentation
# Served at https://<IP>/help/
# Deploy: sudo cp nginx-rusnas-help.conf /etc/nginx/conf.d/rusnas-apps/rusnas-help.conf
# Then: sudo nginx -t && sudo systemctl reload nginx

location /help/ {
    alias /usr/share/rusnas-help/;
    index index.html;
    try_files $uri $uri/ /help/index.html;

    # Cache static assets
    location ~* \.(css|js|png|jpg|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
