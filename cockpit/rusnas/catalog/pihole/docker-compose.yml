version: "3.8"
services:
  pihole:
    image: pihole/pihole:latest
    container_name: rusnas-pihole
    restart: unless-stopped
    ports:
      - "{{WEB_PORT:-8053}}:80"
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      - TZ=Europe/Moscow
      - WEBPASSWORD={{ADMIN_PASSWORD:-changeme}}
      - PIHOLE_DNS_=8.8.8.8;8.8.4.4
    volumes:
      - {{DATA_DIR:-/mnt/data/containers/pihole}}/etc-pihole:/etc/pihole
      - {{DATA_DIR:-/mnt/data/containers/pihole}}/etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    networks:
      - rusnas-pihole

networks:
  rusnas-pihole:
    name: rusnas-pihole
