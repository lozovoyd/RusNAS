version: "3.8"
services:
  wireguard:
    image: docker.io/weejewel/wg-easy:latest
    mem_limit: 256m
    container_name: rusnas-wireguard
    restart: unless-stopped
    ports:
      - "{{WEB_PORT:-51821}}:51821/tcp"
      - "51820:51820/udp"
    environment:
      - WG_HOST={{WG_HOST:-nas.local}}
      - PASSWORD={{ADMIN_PASSWORD:-changeme}}
    volumes:
      - {{DATA_DIR:-/mnt/data/containers/wireguard}}/data:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - rusnas-wireguard

networks:
  rusnas-wireguard:
    name: rusnas-wireguard
