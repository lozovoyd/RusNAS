<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>rusNAS — Пользователи</title>
    <script src="../base1/cockpit.js"></script>
    <script>cockpit.transport.wait(function() {});</script>
    <script>(function(){function t(){var s=localStorage.getItem("shell:style");document.documentElement.setAttribute("data-theme",s==="dark"||(s!=="light"&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light");}t();window.addEventListener("storage",function(e){if(e.key==="shell:style")t();});})()</script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>rusNAS — Пользователи</h1>

    <!-- Пользователи -->
    <div class="section">
        <div class="section-toolbar">
            <h2>Пользователи</h2>
            <button class="btn btn-success" id="btn-add-user">+ Добавить пользователя</button>
        </div>
        <table>
            <thead>
                <tr><th>Имя</th><th>Группы</th><th>Samba</th><th>Действия</th></tr>
            </thead>
            <tbody id="users-body">
                <tr><td colspan="4">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Группы -->
    <div class="section">
        <div class="section-toolbar">
            <h2>Группы</h2>
            <button class="btn btn-success" id="btn-add-group">+ Добавить группу</button>
        </div>
        <table>
            <thead>
                <tr><th>Имя</th><th>Участники</th><th>Действия</th></tr>
            </thead>
            <tbody id="groups-body">
                <tr><td colspan="3">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Modal: Add User -->
    <div class="modal-overlay hidden" id="add-user-modal">
        <div class="modal-box">
            <h3>Добавить пользователя</h3>
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="user-name" placeholder="например: john">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="user-password" placeholder="пароль">
            </div>
            <div class="form-group">
                <label>Добавить в группу</label>
                <select id="user-group-select">
                    <option value="">— без группы —</option>
                </select>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="user-samba" checked>
                    Доступ к Samba шарам
                </label>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="btn-user-create">Создать</button>
                <button class="btn btn-default" id="btn-user-cancel">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Modal: Edit User -->
    <div class="modal-overlay hidden" id="edit-user-modal">
        <div class="modal-box">
            <h3>Редактировать пользователя</h3>
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="edit-user-name" disabled>
            </div>
            <div class="form-group">
                <label>Новый пароль <small class="text-muted">(оставьте пустым чтобы не менять)</small></label>
                <input type="password" id="edit-user-password" placeholder="новый пароль">
            </div>
            <div class="form-group">
                <label>Группы</label>
                <div id="edit-user-groups" class="checkbox-group">
                    <small>Загрузка...</small>
                </div>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="edit-user-samba">
                    Доступ к Samba шарам
                </label>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="btn-user-save">Сохранить</button>
                <button class="btn btn-default" id="btn-user-edit-cancel">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Modal: Add Group -->
    <div class="modal-overlay hidden" id="add-group-modal">
        <div class="modal-box">
            <h3>Добавить группу</h3>
            <div class="form-group">
                <label>Имя группы</label>
                <input type="text" id="group-name" placeholder="например: accounting">
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="btn-group-create">Создать</button>
                <button class="btn btn-default" id="btn-group-cancel">Отмена</button>
            </div>
        </div>
    </div>

    <script src="js/users.js"></script>
</body>
</html>
