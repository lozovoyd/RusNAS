<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e53e3e;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- NAS icon: 3 stacked drive bays -->
  <g fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top bay -->
    <rect x="28" y="22" width="64" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="80" cy="32" r="3" fill="#fff"/>
    <line x1="36" y1="32" x2="56" y2="32"/>
    <!-- Middle bay -->
    <rect x="28" y="50" width="64" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="80" cy="60" r="3" fill="#fff"/>
    <line x1="36" y1="60" x2="56" y2="60"/>
    <!-- Bottom bay -->
    <rect x="28" y="78" width="64" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="80" cy="88" r="3" fill="#fff"/>
    <line x1="36" y1="88" x2="56" y2="88"/>
  </g>
</svg>
