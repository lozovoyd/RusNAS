site_name: RusNAS Documentation
site_description: "Программный комплекс управления сетевым хранилищем данных — документация разработчика и API"
site_url: ""
repo_url: https://github.com/lozovoyd/RusNAS
repo_name: lozovoyd/RusNAS
docs_dir: src

theme:
  name: material
  language: ru
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Светлая тема
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: ru
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../rusnas-guard/daemon
            - ../rusnas-metrics
            - ../rusnas-storage-analyzer
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source
            heading_level: 3

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lozovoyd/RusNAS

nav:
  - Главная: index.md
  - Архитектура:
      - Обзор системы: architecture/overview.md
      - Технологический стек: architecture/tech-stack.md
      - Развёртывание: architecture/deployment.md
  - Спецификации модулей:
      - Guard (Антишифровальщик): specs/guard.md
      - Снапшоты и репликация: specs/snapshots.md
      - RAID Manager: specs/raid-manager.md
      - Хранилище: specs/storage.md
      - Анализатор пространства: specs/storage-analyzer.md
      - SSD-кеширование: specs/ssd-tier.md
      - Дедупликация: specs/dedup.md
      - ИБП / NUT: specs/ups.md
      - Сеть и сертификаты: specs/network.md
      - FileBrowser: specs/filebrowser.md
      - AI-ассистент: specs/mcp-ai.md
      - Performance Tuner: specs/performance.md
  - Руководство разработчика:
      - Быстрый старт: guides/getting-started.md
      - Паттерны Cockpit-плагина: guides/cockpit-patterns.md
      - UI дизайн-система: guides/ui-design.md
      - Известные баги: guides/known-bugs.md
      - Веб-сервисы (nginx/Apache): guides/webservices.md
  - API Reference:
      - JavaScript:
          - eye.js (Утилиты): api/js/eye.md
          - app.js (Хранилище): api/js/app.md
          - dashboard.js: api/js/dashboard.md
          - disks.js (RAID): api/js/disks.md
          - guard.js: api/js/guard.md
          - snapshots.js: api/js/snapshots.md
          - network.js: api/js/network.md
          - performance.js: api/js/performance.md
          - storage-analyzer.js: api/js/storage-analyzer.md
          - dedup.js: api/js/dedup.md
          - ups.js: api/js/ups.md
          - users.js: api/js/users.md
          - ai.js: api/js/ai.md
          - containers.js: api/js/containers.md
          - license.js: api/js/license.md
      - Python:
          - Guard Daemon: api/python/guard.md
          - Container API: api/python/container-api.md
          - Spindown Daemon: api/python/spind.md
          - Network API: api/python/network-api.md
          - Storage Analyzer API: api/python/storage-analyzer.md
          - Metrics Server: api/python/metrics.md
