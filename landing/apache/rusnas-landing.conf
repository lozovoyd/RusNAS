<VirtualHost *:80>
    ServerName rusnas
    DocumentRoot /var/www/rusnas-landing

    <Directory /var/www/rusnas-landing>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Cache static assets
    <FilesMatch "\.(html|css|js|png|jpg|svg|woff2?)$">
        Header set Cache-Control "max-age=3600, public"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/rusnas-landing-error.log
    CustomLog ${APACHE_LOG_DIR}/rusnas-landing-access.log combined
</VirtualHost>
