<VirtualHost *:80>
    ServerName rusnas
    DocumentRoot /var/www/rusnas-landing

    <Directory /var/www/rusnas-landing>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # HTML — no cache (always fresh)
    <FilesMatch "\.html$">
        Header set Cache-Control "no-cache, must-revalidate"
    </FilesMatch>

    # Static assets — short cache
    <FilesMatch "\.(css|js|png|jpg|svg|woff2?)$">
        Header set Cache-Control "max-age=300, public"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/rusnas-landing-error.log
    CustomLog ${APACHE_LOG_DIR}/rusnas-landing-access.log combined
</VirtualHost>
